name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Xcode 26 / iOS 26 SDK image. Adjust the runner label if GitHub renames it.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_26* | sort -V | tail -1)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project HWANGTODO.xcodeproj -scheme HWANGTODO \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            build | xcbeautify --renderer github-actions || true
          # xcbeautify is optional decoration; fail on the real build status:
          xcodebuild -project HWANGTODO.xcodeproj -scheme HWANGTODO \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -quiet build

      - name: Test (Swift Testing)
        run: |
          xcodebuild -project HWANGTODO.xcodeproj -scheme HWANGTODO \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -quiet test

  lint:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint (strict)
        run: swiftlint lint --strict --quiet
