name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26* | sort -V | tail -1)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build + unit tests
        # UI automation is a separate, best-effort job — hosted-runner
        # simulators intermittently refuse app launches (RequestDenied).
        run: |
          xcodebuild -project HWANGTODO.xcodeproj -scheme HWANGTODO \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skip-testing:HWANGTODOUITests \
            -quiet test

  ui-smoke-best-effort:
    # Signal, not gate: the capture-flow XCUITest is authoritative locally
    # (see VERIFICATION.md); hosted simulators flake on app launch.
    runs-on: macos-26
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26* | sort -V | tail -1)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: UI smoke (capture flow)
        run: |
          xcodebuild -project HWANGTODO.xcodeproj -scheme HWANGTODO \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:HWANGTODOUITests \
            -quiet test

  lint:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint (strict)
        run: swiftlint lint --strict --quiet
