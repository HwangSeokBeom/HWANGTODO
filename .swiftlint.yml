# SwiftLint — quality gate for HWANGTODO.
included:
  - Sources
  - Packages/HWANGTODOKit/Sources
  - Packages/HWANGTODOKit/Tests

excluded:
  - HWANGTODO.xcodeproj
  - DerivedData
  - .build

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - multiline_function_chains
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

analyzer_rules:
  - unused_import

disabled_rules:
  # SwiftUI view bodies legitimately nest deeply.
  - nesting
  # House style is SwiftFormat's `--commas always` (trailing commas required);
  # this rule enforces the opposite.
  - trailing_comma
  # The product IS a TODO app — Korean prose and doc comments say "TODO"
  # without marking work items.
  - todo
  # `let _ = observable.property` is REQUIRED inside SwiftUI result builders
  # (plain `_ =` does not compile there); it is how views subscribe.
  - redundant_discardable_let

line_length:
  warning: 130
  error: 170
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900

function_body_length:
  warning: 80
  error: 120

# Exhaustive parsers (DeepLink.parse) switch over every case by design.
cyclomatic_complexity:
  warning: 16
  error: 25

identifier_name:
  min_length: 1 # allow `i`, `x`, Korean-domain short names
  max_length: 50

# User-facing copy is Korean by design (spec §14) — never flag non-ASCII.
custom_rules:
  no_banned_terminology:
    name: "Banned terminology (spec §14)"
    regex: "(받은함|보관함)"
    match_kinds:
      - string
    # TerminologyTests legitimately names the banned words in its test titles.
    excluded: ".*/Tests/.*"
    message: "spec §14: use 빠른 기록/정리 전/완료한 일/지난 기록 instead of 받은함/보관함."
    severity: error
